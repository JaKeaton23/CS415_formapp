# docker-compose.yml
# Brings up the full stack:
#   - dynamodb        : Local DynamoDB instance for development.
#   - dynamodb-admin  : Web UI for inspecting tables/items.
#   - api             : Express backend with the SignUp service and 5-second submit delay.
#   - web             : React + Vite dev server.
version: "3.9"

services:
  dynamodb:
    image: amazon/dynamodb-local:2.5.2
    container_name: signup-dynamodb
    command: -jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: signup-dynamodb-admin
    environment:
      DYNAMO_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    ports:
      - "8001:8001"
    depends_on:
      - dynamodb

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: signup-api
    environment:
      NODE_ENV: development
      PORT: "3001"
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      SIGNUPS_TABLE: SignUps
      SUBMIT_DELAY_MS: "5000"
    ports:
      - "3001:3001"
    depends_on:
      - dynamodb
    # Wait briefly for DynamoDB Local to bind, then create the table and start the API.
    command: ["sh", "-c", "sleep 3 && node create-table.js && node server.js"]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signup-web
    environment:
      VITE_API_TARGET: http://api:3001
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  dynamodb-data:
